    const initApp = async () => {

            const appInstance = appMod.initializeApp(config);
            auth = authMod.getAuth(appInstance);

      if (!textKana) return;
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(textKana);
        utterance.lang = 'ja-JP'; 
        utterance.rate = 0.85; 
        
        const voices = window.speechSynthesis.getVoices();
        const jpVoices = voices.filter(v => v.lang.includes('ja'));
        if(jpVoices.length > 0) {
          let bestVoice = jpVoices.find(v => /Kyoko|Nanami|Google|Female|Haruka/i.test(v.name));
          if(!bestVoice) bestVoice = jpVoices[0];
          utterance.voice = bestVoice;
        }
        window.speechSynthesis.speak(utterance);
      } else {
        alert("Text-to-Speech not supported in this browser.");
      }
    };

    window.runTranslation = async () => {
      const inputEl = document.getElementById('transInput');
      if (!inputEl || !inputEl.value.trim()) return;
      
      const text = inputEl.value.trim();
      state.transLoading = true;
      state.transResult = "Translating...";
      state.transRomaji = "";
      renderApp();

      try {
        // Deep parsing of Google Translate free API to ensure Romaji is extracted
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ja&dt=t&dt=rm&q=${encodeURIComponent(text)}`;
        const res = await fetch(url);
        const data = await res.json();
        
        let jpText = "";
        let romajiText = "";

        if (data && data[0]) {
            data[0].forEach(item => {
                // Japanese Kana/Kanji part
                if (item[0] && typeof item[0] === 'string' && item[0] !== "null" && !item[0].match(/^[a-zA-Z\s]+$/)) {
                    jpText += item[0];
                }
                // Romaji part is often in index 2 or 3
                if (item[2] && typeof item[2] === 'string' && /^[a-zA-Zāēīōūōōuu\-\s\']+$/i.test(item[2])) {
                    romajiText += item[2];
                } else if (item[3] && typeof item[3] === 'string' && /^[a-zA-Zāēīōūōōuu\-\s\']+$/i.test(item[3])) {
                    romajiText += item[3]; 
                }
            });
            
            // Fallback if parsing failed but it exists at the end of the array
            if(!romajiText && data[0].length > 1) {
                const lastEl = data[0][data[0].length - 1];
                if(lastEl && typeof lastEl[2] === 'string') romajiText = lastEl[2];
                else if(lastEl && typeof lastEl[3] === 'string') romajiText = lastEl[3];
            }

            state.transResult = jpText || "Could not translate.";
            state.transRomaji = romajiText ? romajiText.trim() : "Audio available below";
        } else {
            state.transResult = "Could not translate.";
        }
      } catch(e) {
        state.transResult = "Network error. Try again.";
      }
      
      state.transLoading = false;
      renderApp();

    window.handleSpeechRecognition = (e) => {
      if (e) e.preventDefault();
      if (state.selectedAnswer !== null || state.isRecording) return;

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        alert("Speech recognition isn't supported in your browser. Auto-passing this exercise for you!");
        state.score += 1;
        state.selectedAnswer = true;
        state.showFeedback = true;
        renderApp();
        return;
      }

      const recognition = new SpeechRecognition();
      recognition.lang = 'ja-JP';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      
      state.isRecording = true;
      renderApp();

      recognition.onresult = (event) => {
        state.isRecording = false;
        let rawTranscript = event.results[0][0].transcript;
        let transcript = rawTranscript.toLowerCase().trim();
        
        // Remove punctuation/spaces for a fairer comparison
        const cleanTranscript = transcript.replace(/[.,!?。、！？\s]/g, '');

        const exercise = COURSE_DATA.find(d => d.day === state.activeDay).exercises[state.gameStep];
        
        const isMatchKana = exercise.expectedKana.some(k => cleanTranscript.includes(k.replace(/[.,!?。、！？\s]/g, '')));
        const isMatchRomaji = exercise.expectedRomaji.some(r => cleanTranscript.includes(r.replace(/[.,!?。、！？\s]/g, '')));
        
        // Fix: must have spoken something
        const isMatch = cleanTranscript.length > 0 && (isMatchKana || isMatchRomaji);
        
        state.selectedAnswer = isMatch;
        state.showFeedback = true;

        if (isMatch) {
            state.score += 1;
            state.combo += 1;
        } else {
            state.combo = 0;
            // Provide exact user feedback
            exercise.feedback_incorrect = `You said: "${rawTranscript}". Try focusing on the exact pronunciation!`;
            state.currentMistakes.push(exercise.conceptTag);
        }
        renderApp();
      };

      recognition.onerror = (event) => {
        state.isRecording = false;
        state.showFeedback = true;
        state.selectedAnswer = false; // Mark as failed
        state.combo = 0;
        
        const exercise = COURSE_DATA.find(d => d.day === state.activeDay).exercises[state.gameStep];
        
        if (event.error === 'not-allowed') {
          exercise.feedback_incorrect = "Microphone blocked. Please allow mic access!";
        } else if (event.error === 'no-speech') {
          exercise.feedback_incorrect = "No speech detected. Please speak clearly into the microphone.";
        } else { 
          exercise.feedback_incorrect = "Error: " + event.error;
        }
        renderApp();
      };
      
      recognition.start();
    };

          <div class="absolute right-0 top-0 w-64 h-64 bg-gradient-to-bl from-indigo-50 to-transparent rounded-bl-full -z-10"></div>
          
          <h2 class="text-3xl font-black text-gray-900 mb-3 flex items-center gap-3">
            <div class="p-3 bg-indigo-100 text-indigo-600 rounded-2xl"><i data-lucide="bot" class="w-8 h-8"></i></div> 
            AI Sensei Translator
          </h2>
          <p class="text-gray-500 font-bold mb-8 text-lg">Type any English phrase to get the Japanese translation, Romaji, and pronunciation.</p>
          
          <div class="flex flex-col md:flex-row gap-4 mb-4 z-10 relative">
            <input type="text" id="transInput" value="${state.transInput}" onchange="state.transInput = this.value" placeholder="e.g., Where is the train station?" class="flex-grow border-2 border-gray-200 rounded-2xl p-5 text-xl font-bold text-gray-800 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 outline-none transition-all shadow-sm" />
            <button onclick="window.runTranslation()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-10 py-5 rounded-2xl font-black text-xl transition-transform hover:scale-105 shadow-xl shadow-indigo-500/30 flex justify-center items-center gap-3">
              ${state.transLoading ? `<i data-lucide="loader-2" class="animate-spin w-6 h-6"></i>` : `<i data-lucide="languages" class="w-6 h-6"></i> Translate`}
            </button>
          </div>
          
          ${state.transResult ? `
            <div class="mt-8 bg-gray-900 p-8 rounded-[1.5rem] flex flex-col md:flex-row justify-between items-start md:items-center gap-6 shadow-2xl animate-pop border border-gray-800">
              <div>
                 <span class="text-3xl md:text-4xl font-black text-white block mb-2">${state.transResult}</span>
                 <span class="text-xl font-bold text-indigo-300 tracking-wide">${state.transRomaji}</span>
              </div>
              <button onclick="window.playAudio(event, '${state.transResult}')" class="bg-rose-500 hover:bg-rose-400 shadow-lg text-white p-5 rounded-full transition-transform hover:scale-110 shrink-0 w-full md:w-auto flex justify-center">
                <i data-lucide="volume-2" class="w-8 h-8"></i>
              </button>
            </div>
          ` : ''}
        </div>

        <div class="bg-gradient-to-r from-rose-400 to-orange-400 text-white rounded-[2.5rem] p-10 md:p-12 mb-12 shadow-xl text-center md:text-left relative overflow-hidden">
          <i data-lucide="book-marked" class="absolute right-0 bottom-0 w-64 h-64 opacity-10 transform translate-x-10 translate-y-10"></i>
          <h1 class="text-4xl md:text-5xl font-black mb-4 flex items-center justify-center md:justify-start gap-4 relative z-10">
             Survival Guide 🎒
          </h1>
          <p class="text-rose-50 text-xl font-bold relative z-10">Master these 90% of basic interactions.</p>
        </div>
        <div class="space-y-16">
      `;

      LIBRARY_DATA.forEach(section => {
        let itemsHtml = section.items.map(item => `
          <div class="bg-white p-8 rounded-[1.5rem] shadow-sm border-2 border-gray-50 flex flex-col justify-between hover:shadow-xl hover:-translate-y-1 hover:border-indigo-100 transition-all group">
            <div class="mb-4">
              <div class="flex justify-between items-start mb-4 gap-4">
                <div>
                  <p class="text-3xl font-black text-gray-900 mb-2 group-hover:text-indigo-600 transition-colors">${item.kana}</p>
                  <p class="text-sm font-black text-indigo-500 uppercase tracking-widest">${item.romaji}</p>
                </div>
                <button onclick="window.playAudio(event, '${item.kana}')" class="shrink-0 flex items-center justify-center gap-2 bg-gray-50 hover:bg-indigo-50 border border-gray-200 hover:border-indigo-200 text-gray-700 hover:text-indigo-700 p-4 rounded-full transition-all shadow-sm">
                  <i data-lucide="volume-2" class="w-6 h-6"></i>
                </button>
              </div>
              <p class="text-gray-700 font-black text-xl mb-5">"${item.eng}"</p>
              <div class="bg-gray-50 p-5 rounded-2xl border border-gray-100">
                <span class="text-[11px] font-black text-rose-500 uppercase tracking-widest block mb-2 flex items-center gap-1"><i data-lucide="info" class="w-4 h-4"></i> Note</span>
                <p class="text-gray-600 text-base font-bold leading-relaxed">${item.context}</p>
              </div>
            </div>
          </div>
        `).join('');

        html += `
          <section>
            <h2 class="text-3xl font-black text-gray-800 mb-8 flex items-center gap-3 border-b-4 border-gray-100 pb-4 inline-flex">
              <div class="p-2 bg-gray-100 rounded-xl"><i data-lucide="${section.icon}" class="${section.iconColor} w-8 h-8"></i></div>
              ${section.category}
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
              ${itemsHtml}
            </div>
          </section>
        `;
      });

      html += `</div></div>`;
      return html;
    };

    const renderProfile = () => `
      <div class="max-w-md mx-auto mt-10 md:mt-20 px-4 pb-20 animate-pop">
        <div class="bg-white rounded-[3rem] japanese-shadow p-10 border border-gray-50 text-center relative overflow-hidden">
          
          <div class="w-32 h-32 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-8 border-8 border-white shadow-xl relative z-10">
            <i data-lucide="user" class="w-16 h-16"></i>
          </div>
          <h2 class="text-4xl font-black text-gray-900 mb-2">Student Profile</h2>
          <p class="text-gray-500 mb-12 font-bold text-lg">Your progress is saved automatically.</p>
          
          <div class="text-left mb-10">
            <label class="block text-sm font-black text-gray-500 mb-3 uppercase tracking-widest">Nickname</label>
            <input 
              type="text" 
              value="${state.profileName}"
              onchange="window.updateProfileName(this.value)"
              class="w-full border-2 border-gray-200 rounded-2xl p-5 text-2xl font-black text-gray-800 focus:border-indigo-500 outline-none transition-colors shadow-inner bg-gray-50 focus:bg-white"
            />
          </div>

          <div class="bg-gray-900 p-8 rounded-3xl mb-12 flex justify-between items-center text-left shadow-xl">
            <div>
              <p class="text-gray-400 text-xs font-black uppercase tracking-widest mb-1">Days Mastered</p>
              <p class="text-5xl font-black text-green-400">${state.completedDays.length}</p>
            </div>
            <i data-lucide="award" class="text-yellow-400 w-16 h-16"></i>
          </div>

          <button onclick="window.handleSwitchAccount()" class="w-full bg-white border-2 border-gray-200 hover:bg-gray-50 hover:border-gray-300 text-gray-800 py-5 rounded-2xl font-black text-lg shadow-sm transition-all flex justify-center items-center gap-3">
            <i data-lucide="log-out" class="w-6 h-6"></i> Clear / Reset Progress
          </button>
        </div>
      </div>
    `;

    // Boot App
    initApp();

  </script>
</body>
</html>
